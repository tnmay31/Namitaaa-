	  <div id="musicPermissionPopup" class="music-popup-overlay">

        <div class="music-popup-icon">🎵🎂</div>
        <h2 class="music-popup-title">Birthday Song</h2>
        <p class="music-popup-text">👽 Namiii 👽<br>Play birthday music?</p>
        <div class="music-popup-buttons">

<audio id="bgMusic" loop style="display:none;"></audio>
</body>



<script>
    let datetxt = "31 May 2004";
    let datatxtletter = "🎉 Happy Birthday mere Alien 👽🎂💖 You are a very special girl, and I’m truly grateful you came into my life. 🌸 I wish you good health, happiness, and lots of success. ✨ I admire how hard you work for your future, and I know all your dreams will come true. 🌟 Keep shining and keep smiling. 💫❤️ Have a wonderful birthday! 🥳";
    let titleLetter = "To you";
    let charArrDate = datetxt.split('');
    let charArrDateLetter = datatxtletter.split('');
    let charArrTitle = titleLetter.split('');
    let currentIndex = 0;
    let currentIndexLetter = 0;
    let currentIndexTitle = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");
    let text__letter = document.querySelector(".text__letter p");
    setTimeout(function(){
        timeDatetxt = setInterval(function(){
            if(currentIndex < charArrDate.length){
                date__of__birth.textContent += charArrDate[currentIndex];
                currentIndex++;
            }
            else{
                let i = document.createElement("i");
                i.className = "fa-solid fa-star"
                document.querySelector(".date__of__birth").prepend(i)
                document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                clearInterval(timeDatetxt)
            }
        },100)
    },12000)

    var intervalContent;
    var intervalTitle;
    $("#btn__letter").on("click", function(){
        $(".box__letter").slideDown()
        setTimeout(function(){
            $(".letter__border").slideDown();
        },1000)
        setTimeout(function(){
            intervalTitle = setInterval(function(){
                if(currentIndexTitle < charArrTitle.length){
                    document.querySelector(".title__letter").textContent += charArrTitle[currentIndexTitle];
                    let i = document.createElement("i");
                    i.className = "fa-solid fa-heart"
                    document.querySelector(".title__letter").appendChild(i)
                    currentIndexTitle++;
                }
                else{
                    clearInterval(intervalTitle)
                }
            },100)
        },2000)
        setTimeout(function(){
            document.querySelector("#heart__letter").classList.add("animationOp");
            document.querySelector(".love__img").classList.add("animationOp");
            document.querySelector("#mewmew").classList.add("animationOp");
        },2800)
        setTimeout(function(){
            document.querySelectorAll(".heart").forEach((item)=>{
                item.classList.add("animation")
            })
        },3500)
        setTimeout(function(){
            intervalContent = setInterval(function(){
                if(currentIndexLetter < charArrDateLetter.length){
                    text__letter.textContent += charArrDateLetter[currentIndexLetter];
                    currentIndexLetter++;
                }
                else{
                    clearInterval(intervalContent)
                }
            },50)
        },6000)
    })
    $(".close").on("click", function(){
        clearInterval(intervalContent)
        document.querySelector(".title__letter").textContent = "";
        text__letter.textContent = "";
        currentIndexLetter = 0
        currentIndexTitle = 0
        document.querySelector("#heart__letter").classList.remove("animationOp");
        document.querySelector(".love__img").classList.remove("animationOp");
        document.querySelector("#mewmew").classList.remove("animationOp");
        document.querySelectorAll(".heart").forEach((item)=>{
                item.classList.remove("animation")
            })
        $(".box__letter").slideUp();
        $(".letter__border").slideUp();
    })
     // 🔥 CHANGE THIS TO YOUR AUDIO FILE PATH 🔥
    const musicFile = "images/birthday_song.mp3";
    
    const popup = document.getElementById('musicPermissionPopup');
    const allowBtn = document.getElementById('allowMusicBtn');
    const denyBtn = document.getElementById('denyMusicBtn');
    const audio = document.getElementById('bgMusic');
    
    audio.src = musicFile;
    audio.volume = 0.4;
    audio.loop = true;
    
    allowBtn.onclick = function() {
        popup.style.display = 'none';
        audio.play().then(() => console.log('Music playing')).catch(e => alert('File not found: ' + musicFile));
    };
    
    denyBtn.onclick = function() {
        popup.style.display = 'none';
    };
    (function() {
        // ===== BOUQUET BUTTON + FULLSCREEN IMAGE (standalone, no conflicts) =====
        
        // Get elements
        const button = document.getElementById('bouquetTriggerButton');
        const overlay = document.getElementById('bouquetOverlay');
        const bouquetImg = document.getElementById('bouquetImage');
        
        // Function to open overlay with bouquet image
        function showBouquet() {
            if (!overlay) return;
            // ensure image source is up-to-date (if dynamic, but fine)
            overlay.style.visibility = 'visible';
            overlay.style.opacity = '1';
            // optional: prevent background scrolling on body
            document.body.style.overflow = 'hidden';
        }
        
        // Function to close overlay
        function closeBouquet() {
            if (!overlay) return;
            overlay.style.visibility = 'hidden';
            overlay.style.opacity = '0';
            document.body.style.overflow = '';
        }
        
        // Add click event to the button
        if (button) {
            button.addEventListener('click', (e) => {
                e.stopPropagation();  // avoid any weird bubbling
                showBouquet();
            });
        }
        
        // Close overlay when clicking anywhere on the overlay (background or image)
        if (overlay) {
            overlay.addEventListener('click', (e) => {
                // clicking anywhere on the overlay closes it (user friendly)
                closeBouquet();
            });
        }
        
        // also close with ESC key for better UX
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay && overlay.style.visibility === 'visible') {
                closeBouquet();
            }
        });
        
        // small safety: if image fails to load, fallback to a simple placeholder text but still works
        if (bouquetImg) {
            bouquetImg.onerror = function() {
                // fallback: show a local nice message or alternative image? but user will replace anyway.
                // we keep silent but set an alternative so it's not broken
                if (this.src.indexOf('pexels') !== -1 || this.src.indexOf('placeholder') !== -1) {
                    // but it's fine because user will set their own bouquet photo.
                    console.log("Please replace bouquet image URL with your own bouquet photo!");
                }
            };
        }
        
        // ensure no body overflow gets stuck if something unusual happens
        window.addEventListener('beforeunload', function() {
            document.body.style.overflow = '';
        });
        
    })();
</script>
